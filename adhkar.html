<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f1a0f">
<title>الأذكار</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap');

  :root {
    --bg: #0f1a0f;
    --surface: #162316;
    --surface2: #1c2e1c;
    --border: #2a4a2a;
    --green: #4a9c5a;
    --green-light: #6abf7a;
    --green-done: #2d6b3a;
    --gold: #c9a84c;
    --text: #e8ead0;
    --text-muted: #8a9e8a;
    --text-dim: #5a6e5a;
    --white: #f0f2e0;
    --radius: 18px;
    --header-bg: #0f1a0f;
    --header-bg2: rgba(15,26,15,0.97);
    --card-done-bg1: #0e2414;
    --card-done-bg2: #122818;
  }

  body.light {
    --bg: #f0f4f0;
    --surface: #ffffff;
    --surface2: #e8f0e8;
    --border: #c0d8c0;
    --green: #3a8a4a;
    --green-light: #4aaa5a;
    --green-done: #2d6b3a;
    --gold: #a07820;
    --text: #1a2e1a;
    --text-muted: #4a6a4a;
    --text-dim: #7a9a7a;
    --white: #1a2e1a;
    --header-bg: #f0f4f0;
    --header-bg2: rgba(240,244,240,0.97);
    --card-done-bg1: #d8f0d8;
    --card-done-bg2: #e0f5e0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: 90px;
  }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg, var(--header-bg) 0%, var(--header-bg2) 100%);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 0;
  }

  .header-top {
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 14px; position: relative;
  }

  .app-title { font-family: 'Amiri', serif; font-size: 22px; color: var(--gold); }

  .reset-btn {
    position: absolute; left: 0;
    background: none; border: 1px solid var(--border);
    color: var(--text-muted); padding: 6px 10px;
    border-radius: 10px; font-family: 'Cairo', sans-serif;
    font-size: 12px; cursor: pointer; transition: all 0.2s;
  }
  .theme-btn {
    position: absolute; right: 0;
    background: none; border: 1px solid var(--border);
    padding: 6px 10px; border-radius: 10px;
    font-size: 16px; cursor: pointer; transition: all 0.2s;
  }
  .theme-btn:active { background: var(--surface2); }

  .tabs { display: flex; gap: 4px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex: 1; padding: 10px 4px; border: none; background: none;
    color: var(--text-dim); font-family: 'Cairo', sans-serif;
    font-size: 14px; font-weight: 600; cursor: pointer;
    border-bottom: 3px solid transparent; transition: all 0.25s; white-space: nowrap;
  }
  .tab.active { color: var(--gold); border-bottom-color: var(--gold); }

  .progress-wrap {
    padding: 8px 16px 0; display: flex; align-items: center; gap: 10px;
  }
  .progress-bar { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--green-light));
    border-radius: 2px; transition: width 0.4s ease;
    box-shadow: 0 0 8px rgba(74,156,90,0.5);
  }
  .progress-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  .content { padding: 16px; display: none; flex-direction: column; gap: 12px; }
  .content.active { display: flex; }

  .section-title {
    text-align: center; font-family: 'Amiri', serif;
    font-size: 20px; color: var(--gold); padding: 8px 0 2px; letter-spacing: 1px;
  }
  .section-subtitle { text-align: center; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }

  .dhikr-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px 18px 14px;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative; overflow: hidden; cursor: pointer;
    user-select: none; -webkit-user-select: none;
  }
  .dhikr-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(74,156,90,0.08) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.4s;
  }
  .dhikr-card.done {
    background: linear-gradient(135deg, var(--card-done-bg1) 0%, var(--card-done-bg2) 100%);
    border-color: var(--green-done);
  }
  .dhikr-card.done::before { opacity: 1; }
  .dhikr-card:active { transform: scale(0.98); }

  .dhikr-card .ripple {
    position: absolute; border-radius: 50%;
    background: rgba(74,156,90,0.25); transform: scale(0);
    animation: ripple-anim 0.5s ease-out; pointer-events: none;
  }
  @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

  .dhikr-text {
    font-family: 'Amiri', serif; font-size: 20px; line-height: 2;
    color: var(--white); text-align: center; margin-bottom: 12px; transition: color 0.3s;
  }
  .dhikr-card.done .dhikr-text { color: #a8d8a8; }

  .dhikr-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .dhikr-card.done .dhikr-footer { border-top-color: var(--green-done); }

  .dhikr-source { font-size: 11px; color: var(--text-dim); text-align: right; line-height: 1.6; }
  .dhikr-source span { display: block; color: var(--text-muted); font-size: 10px; }
  .dhikr-source .repeat { color: var(--gold); margin-top: 2px; }

  .counter-wrap { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

  .check-icon {
    width: 38px; height: 38px; border-radius: 50%;
    border: 2px solid var(--border); display: flex;
    align-items: center; justify-content: center;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    background: var(--surface2);
  }
  .check-icon svg { width: 18px; height: 18px; stroke: var(--text-dim); transition: all 0.3s; }
  .dhikr-card.done .check-icon {
    background: var(--green); border-color: var(--green-light);
    box-shadow: 0 0 16px rgba(74,156,90,0.5);
  }
  .dhikr-card.done .check-icon svg { stroke: white; transform: scale(1.1); }

  .dots-progress { display: flex; gap: 4px; align-items: center; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); transition: all 0.3s; flex-shrink: 0; }
  .dot.filled { background: var(--green); box-shadow: 0 0 6px rgba(74,156,90,0.6); }

  .ring-counter { position: relative; width: 48px; height: 48px; flex-shrink: 0; }
  .ring-counter svg { transform: rotate(-90deg); width: 48px; height: 48px; }
  .ring-counter .ring-bg { stroke: var(--border); }
  .ring-counter .ring-fill {
    stroke: var(--green); stroke-linecap: round;
    transition: stroke-dashoffset 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(0 0 4px rgba(74,156,90,0.8));
  }
  .ring-counter.done .ring-fill { stroke: var(--green-light); }
  .ring-label {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: var(--text);
  }
  .ring-counter.done .ring-label { color: var(--green-light); }

  .all-done {
    text-align: center; padding: 40px 20px;
    display: none; flex-direction: column; align-items: center; gap: 12px;
  }
  .all-done.show { display: flex; }
  .done-icon {
    width: 80px; height: 80px;
    background: radial-gradient(circle, var(--green), var(--green-done));
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(74,156,90,0.4);
    animation: pulse-done 2s ease-in-out infinite;
  }
  @keyframes pulse-done {
    0%, 100% { box-shadow: 0 0 40px rgba(74,156,90,0.4); }
    50% { box-shadow: 0 0 60px rgba(74,156,90,0.7); }
  }
  .done-icon svg { width: 40px; height: 40px; stroke: white; stroke-width: 2.5; }
  .done-title { font-family: 'Amiri', serif; font-size: 24px; color: var(--gold); }
  .done-sub { font-size: 14px; color: var(--text-muted); line-height: 1.8; }

  .bottom-glow {
    position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
    background: linear-gradient(0deg, var(--bg) 60%, transparent);
    pointer-events: none; z-index: 50;
  }

  @keyframes shimmer {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .dhikr-card { animation: shimmer 0.3s ease both; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <button class="reset-btn" onclick="resetAll()">↺ إعادة</button>
    <div class="app-title">﷽ الأذكار</div>
    <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('morning', this)">الصباح</button>
    <button class="tab" onclick="switchTab('evening', this)">المساء</button>
    <button class="tab" onclick="switchTab('sleep', this)">النوم</button>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-text" id="progressText">0 / 0</div>
</div>

<div class="content active" id="morning">
  <div class="section-title">أذكار الصباح</div>
  <div class="section-subtitle">تُقال بعد صلاة الفجر حتى شروق الشمس</div>
</div>

<div class="content" id="evening">
  <div class="section-title">أذكار المساء</div>
  <div class="section-subtitle">تُقال بعد صلاة العصر حتى غروب الشمس</div>
</div>

<div class="content" id="sleep">
  <div class="section-title">أذكار النوم</div>
  <div class="section-subtitle">تُقال عند الأوي إلى الفراش</div>
</div>

<div class="bottom-glow"></div>

<script>
const adhkar = {
  morning: [
    { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ\n\naللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ", count: 1, source: "آية الكرسي - البقرة 255" },
    { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم\n\nقُلْ هُوَ اللَّهُ أَحَدٌ، اللَّهُ الصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ", count: 3, source: "سورة الإخلاص" },
    { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم\n\nقُلْ أَعُوذُ بِرَبِّ الْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ النَّفَّاثَاتِ فِى الْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ", count: 3, source: "سورة الفلق" },
    { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم\n\nقُلْ أَعُوذُ بِرَبِّ النَّاسِ، مَلِكِ النَّاسِ، إِلَاهِ النَّاسِ، مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ، الَّذِى يُوَسْوِسُ فِى صُدُورِ النَّاسِ، مِنَ الْجِنَّةِ وَالنَّاسِ", count: 3, source: "سورة الناس" },
    { text: "أَصْبَحْنا وَأَصْبَحَ المُلْكُ لله وَالحَمدُ لله، لا إلهَ إلاّ اللّهُ وَحدَهُ لا شَريكَ لهُ، لهُ المُلكُ ولهُ الحَمْد، وهُوَ على كلّ شَيءٍ قدير، رَبِّ أسْأَلُكَ خَيرَ ما في هذا اليوم وَخَيرَ ما بَعْدَه، وَأَعوذُ بِكَ مِنْ شَرِّ ما في هذا اليوم وَشَرِّ ما بَعْدَه، رَبِّ أَعوذُ بِكَ مِنَ الْكَسَلِ وَسوءِ الْكِبَر، رَبِّ أَعوذُ بِكَ مِنْ عَذابٍ في النّارِ وَعَذابٍ في القَبْر", count: 1, source: "مسلم" },
    { text: "اللّهُمَّ أَنْتَ رَبِّي لا إلهَ إلاّ أَنْتَ، خَلَقْتَنِي وَأَنا عَبْدُك، وَأَنا عَلى عَهْدِكَ وَوَعْدِكَ ما اسْتَطَعْت، أَعوذُ بِكَ مِنْ شَرِّ ما صَنَعْت، أَبوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ وَأَبوءُ بِذَنْبي فَاغْفِرْ لي فَإِنَّهُ لا يَغْفِرُ الذُّنوبَ إِلاّ أَنْتَ", count: 1, source: "سيد الاستغفار - البخاري" },
    { text: "رَضِيتُ بِاللهِ رَبَّاً وَبِالإسْلامِ دِيناً وَبِمُحَمَّدٍ صلى الله عليه وسلم نَبِيّاً", count: 3, source: "أبو داود وابن ماجه" },
    { text: "اللّهُمَّ إِنِّي أَصْبَحْتُ أُشْهِدُك، وَأُشْهِدُ حَمَلَةَ عَرْشِك، وَمَلَائِكَتَك، وَجَمِيعَ خَلْقِك، أَنَّكَ أَنْتَ اللهُ لا إلهَ إلاّ أَنْتَ وَحْدَكَ لا شَريكَ لَك، وَأَنَّ مُحَمَّداً عَبْدُكَ وَرَسولُك", count: 4, source: "أبو داود" },
    { text: "اللّهُمَّ ما أَصْبَحَ بي مِنْ نِعْمَةٍ أَو بِأَحَدٍ مِنْ خَلْقِك، فَمِنْكَ وَحْدَكَ لا شريكَ لَك، فَلَكَ الْحَمْدُ وَلَكَ الشُّكْر", count: 1, source: "أبو داود" },
    { text: "حَسْبِيَ اللّهُ لا إلهَ إلاّ هُوَ عَلَيهِ تَوَكَّلتُ وَهُوَ رَبُّ العَرْشِ العَظِيم", count: 7, source: "أبو داود" },
    { text: "بِسمِ اللهِ الذي لا يَضُرُّ مَعَ اسمِهِ شَيءٌ في الأرْضِ وَلا في السَّماءِ وَهوَ السَّمِيعُ العَلِيم", count: 3, source: "أبو داود والترمذي" },
    { text: "اللّهُمَّ بِكَ أَصْبَحْنا وَبِكَ أَمْسَيْنا، وَبِكَ نَحْيا وَبِكَ نَمُوتُ وَإِلَيْكَ النُّشُور", count: 1, source: "أبو داود" },
    { text: "أَصْبَحْنا عَلَى فِطْرَةِ الإسْلاَمِ، وَعَلَى كَلِمَةِ الإِخْلاَصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ صَلَّى اللهُ عَلَيْهِ وَسَلَّمَ، وَعَلَى مِلَّةِ أَبِينَا إبْرَاهِيمَ حَنِيفاً مُسْلِماً وَمَا كَانَ مِنَ المُشْرِكِينَ", count: 1, source: "أحمد" },
    { text: "سُبْحَانَ اللهِ وَبِحَمْدِهِ عَدَدَ خَلْقِه، وَرِضا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدادَ كَلِمَاتِهِ", count: 3, source: "مسلم" },
    { text: "اللّهُمَّ عافِنِي في بَدَنِي، اللّهُمَّ عافِنِي في سَمْعِي، اللّهُمَّ عافِنِي في بَصَرِي، لا إلهَ إلاّ أَنْتَ", count: 3, source: "أبو داود" },
    { text: "اللّهُمَّ إِنِّي أَعوذُ بِكَ مِنَ الْكُفر، وَالفَقْر، وَأَعوذُ بِكَ مِنْ عَذابِ القَبْر، لا إلهَ إلاّ أَنْتَ", count: 3, source: "أبو داود والنسائي" },
    { text: "اللّهُمَّ إِنِّي أَسْأَلُكَ العَفْوَ وَالعَافِيةَ في الدُّنْيا وَالآخِرَة، اللّهُمَّ إِنِّي أَسْأَلُكَ العَفْوَ وَالعَافِيةَ في دِيني وَدُنْيايَ وَأَهْلي وَمالِي، اللّهُمَّ اسْتُرْ عَوْراتي وَآمِنْ رَوْعاتِي، اللّهُمَّ احْفَظْنِي مِن بَيْنِ يَدَيَّ وَمِن خَلْفِي وَعَن يَمِينِي وَعَن شِمالِي، وَمِن فَوْقِي، وَأَعوذُ بِعَظَمَتِكَ أَن أُغْتالَ مِن تَحْتِي", count: 1, source: "أبو داود وابن ماجه" },
    { text: "يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ أَصْلِحْ لِي شَأْنِي كُلَّهُ وَلاَ تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْنٍ", count: 3, source: "الحاكم" },

    { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ\n\naللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ", count: 1, source: "آية الكرسي - البقرة 255" },
    { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ\n\nآمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ وَالْمُؤْمِنُونَ كُلٌّ آمَنَ بِاللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِنْ رُسُلِهِ وَقَالُوا سَمِعْنَا وَأَطَعْنَا غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ. لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ رَبَّنَا لَا تُؤَاخِذْنَا إِنْ نَسِينَا أَوْ أَخْطَأْنَا رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِنْ قَبْلِنَا رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا أَنْتَ مَوْلَانَا فَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ", count: 1, source: "خاتمة البقرة 285-286" },
    { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم\n\nقُلْ هُوَ اللَّهُ أَحَدٌ، اللَّهُ الصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ", count: 3, source: "سورة الإخلاص" },
    { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم\n\nقُلْ أَعُوذُ بِرَبِّ الْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ النَّفَّاثَاتِ فِى الْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ", count: 3, source: "سورة الفلق" },
    { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم\n\nقُلْ أَعُوذُ بِرَبِّ النَّاسِ، مَلِكِ النَّاسِ، إِلَاهِ النَّاسِ، مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ، الَّذِى يُوَسْوِسُ فِى صُدُورِ النَّاسِ، مِنَ الْجِنَّةِ وَالنَّاسِ", count: 3, source: "سورة الناس" },
    { text: "أَمْسَيْنا وَأَمْسَى المُلْكُ لله وَالحَمدُ لله، لا إلهَ إلاّ اللّهُ وَحدَهُ لا شَريكَ لهُ، لهُ المُلكُ ولهُ الحَمْد، وهُوَ على كلّ شَيءٍ قدير، رَبِّ أسْأَلُكَ خَيرَ ما في هذهِ اللَّيْلَةِ وَخَيرَ ما بَعْدَها، وَأَعوذُ بِكَ مِنْ شَرِّ ما في هذهِ اللَّيْلةِ وَشَرِّ ما بَعْدَها، رَبِّ أَعوذُ بِكَ مِنَ الْكَسَلِ وَسوءِ الْكِبَر، رَبِّ أَعوذُ بِكَ مِنْ عَذابٍ في النّارِ وَعَذابٍ في القَبْر", count: 1, source: "مسلم" },

    { text: "سُبْحَانَ اللَّهِ", count: 33, source: "البخاري ومسلم" },
    { text: "الْحَمْدُ لِلَّهِ", count: 33, source: "البخاري ومسلم" },
    { text: "اللَّهُ أَكْبَرُ", count: 34, source: "البخاري ومسلم" },
    { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم\n\nقُلْ هُوَ اللَّهُ أَحَدٌ، اللَّهُ الصَّمَدُ، لَمْ يَلِدْ وَلَمْ يُولَدْ، وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ\n\nيَجْمَعُ كَفَّيْهِ وَيَنْفُثُ فِيهِمَا ثُمَّ يَمْسَحُ بِهِمَا وَجْهَهُ وَجَسَدَهُ", count: 3, source: "البخاري ومسلم" },
    { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم\n\nقُلْ أَعُوذُ بِرَبِّ الْفَلَقِ، مِن شَرِّ مَا خَلَقَ، وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ، وَمِن شَرِّ النَّفَّاثَاتِ فِى الْعُقَدِ، وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ", count: 3, source: "البخاري ومسلم" },
    { text: "بِسْمِ اللهِ الرَّحْمنِ الرَّحِيم\n\nقُلْ أَعُوذُ بِرَبِّ النَّاسِ، مَلِكِ النَّاسِ، إِلَاهِ النَّاسِ، مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ، الَّذِى يُوَسْوِسُ فِى صُدُورِ النَّاسِ، مِنَ الْجِنَّةِ وَالنَّاسِ", count: 3, source: "البخاري ومسلم" },
    { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ\n\naللّهُ لاَ إِلَـهَ إِلاَّ هُوَ الْحَيُّ الْقَيُّومُ لاَ تَأْخُذُهُ سِنَةٌ وَلاَ نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلاَّ بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلاَ يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلاَّ بِمَا شَاء وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالأَرْضَ وَلاَ يَؤُودُهُ حِفْظُهُمَا وَهُوَ الْعَلِيُّ الْعَظِيمُ", count: 1, source: "آية الكرسي - البقرة 255" },
    { text: "أَعُوذُ بِاللهِ مِنْ الشَّيْطَانِ الرَّجِيمِ\n\nآمَنَ الرَّسُولُ بِمَا أُنْزِلَ إِلَيْهِ مِنْ رَبِّهِ وَالْمُؤْمِنُونَ كُلٌّ آمَنَ بِاللَّهِ وَمَلَائِكَتِهِ وَكُتُبِهِ وَرُسُلِهِ لَا نُفَرِّقُ بَيْنَ أَحَدٍ مِنْ رُسُلِهِ وَقَالُوا سَمِعْنَا وَأَطَعْنَا غُفْرَانَكَ رَبَّنَا وَإِلَيْكَ الْمَصِيرُ. لَا يُكَلِّفُ اللَّهُ نَفْسًا إِلَّا وُسْعَهَا لَهَا مَا كَسَبَتْ وَعَلَيْهَا مَا اكْتَسَبَتْ رَبَّنَا لَا تُؤَاخِذْنَا إِنْ نَسِينَا أَوْ أَخْطَأْنَا رَبَّنَا وَلَا تَحْمِلْ عَلَيْنَا إِصْرًا كَمَا حَمَلْتَهُ عَلَى الَّذِينَ مِنْ قَبْلِنَا رَبَّنَا وَلَا تُحَمِّلْنَا مَا لَا طَاقَةَ لَنَا بِهِ وَاعْفُ عَنَّا وَاغْفِرْ لَنَا وَارْحَمْنَا أَنْتَ مَوْلَانَا فَانْصُرْنَا عَلَى الْقَوْمِ الْكَافِرِينَ", count: 1, source: "خاتمة البقرة 285-286" },
  ]
};

let state = {};
let currentTab = 'morning';

function getKey(tab, i) { return tab + '_' + i; }

function loadState() {
  try { state = JSON.parse(localStorage.getItem('adhkar_v3') || '{}'); } catch(e) { state = {}; }
}
function saveState() {
  localStorage.setItem('adhkar_v3', JSON.stringify(state));
}

function buildCards() {
  ['morning','evening','sleep'].forEach(tab => {
    const container = document.getElementById(tab);
    container.querySelectorAll('.dhikr-card,.all-done').forEach(e => e.remove());
    adhkar[tab].forEach((d, i) => {
      const curr = state[getKey(tab,i)] || 0;
      const done = curr >= d.count;
      const card = document.createElement('div');
      card.className = 'dhikr-card' + (done ? ' done' : '');
      card.id = 'card_' + tab + '_' + i;
      card.innerHTML = buildCardInner(d, curr);
      card.addEventListener('click', (e) => onCardClick(e, tab, i));
      container.appendChild(card);
    });
    const doneEl = document.createElement('div');
    doneEl.className = 'all-done';
    doneEl.id = 'done_' + tab;
    doneEl.innerHTML = '<div class="done-icon"><svg viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12"/></svg></div><div class="done-title">اكتمل الورد 🌙</div><div class="done-sub">جزاك الله خيراً<br>تقبّل الله منك</div>';
    container.appendChild(doneEl);
  });
}

function buildCardInner(d, curr) {
  const done = curr >= d.count;
  const lines = d.text.split('\n');
  let textHtml = '';
  lines.forEach((line, i) => {
    if (!line.trim()) { textHtml += '<br>'; return; }
    if (i === 0 && lines.length > 1 && (line.includes('بِسْمِ') || line.includes('أَعُوذُ') || line.includes('يَجْمَعُ'))) {
      textHtml += '<span style="font-size:14px;color:var(--text-muted)">' + line + '</span><br>';
    } else {
      textHtml += line + (i < lines.length - 1 ? '<br>' : '');
    }
  });

  let ctr = '';
  if (d.count === 1) {
    ctr = '<div class="check-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg></div>';
  } else if (d.count <= 4) {
    const dots = Array.from({length: d.count}, (_, k) =>
      '<div class="dot' + (k < curr ? ' filled' : '') + '"></div>'
    ).join('');
    ctr = '<div class="dots-progress">' + dots + '</div>';
  } else {
    const r = 18, circ = 2 * Math.PI * r;
    const progress = done ? 1 : curr / d.count;
    const offset = circ * (1 - progress);
    const label = done ? '✓' : (curr + '/' + d.count);
    ctr = '<div class="ring-counter' + (done?' done':'') + '"><svg viewBox="0 0 48 48"><circle class="ring-bg" cx="24" cy="24" r="' + r + '" fill="none" stroke-width="3"/><circle class="ring-fill" cx="24" cy="24" r="' + r + '" fill="none" stroke-width="3" stroke-dasharray="' + circ.toFixed(2) + '" stroke-dashoffset="' + offset.toFixed(2) + '"/></svg><div class="ring-label" style="font-size:10px">' + label + '</div></div>';
  }

  const rep = d.count === 1 ? 'مرة واحدة' : (d.count + ' مرات');
  return '<div class="dhikr-text">' + textHtml + '</div><div class="dhikr-footer"><div class="dhikr-source">' + d.source + '<span class="repeat">' + rep + '</span></div><div class="counter-wrap">' + ctr + '</div></div>';
}

function onCardClick(e, tab, index) {
  const d = adhkar[tab][index];
  const key = getKey(tab, index);
  let curr = state[key] || 0;
  if (curr >= d.count) return;

  const card = document.getElementById('card_' + tab + '_' + index);
  const rect = card.getBoundingClientRect();
  const rip = document.createElement('div');
  rip.className = 'ripple';
  const sz = Math.max(rect.width, rect.height);
  rip.style.cssText = 'width:' + sz + 'px;height:' + sz + 'px;left:' + (e.clientX - rect.left - sz/2) + 'px;top:' + (e.clientY - rect.top - sz/2) + 'px';
  card.appendChild(rip);
  setTimeout(() => rip.remove(), 500);

  curr++;
  state[key] = curr;
  saveState();

  if (navigator.vibrate) navigator.vibrate(curr >= d.count ? [30,10,30] : 15);

  card.innerHTML = buildCardInner(d, curr);
  const newCard = card.cloneNode(true);
  card.parentNode.replaceChild(newCard, card);
  newCard.addEventListener('click', (ev) => onCardClick(ev, tab, index));

  if (curr >= d.count) {
    newCard.classList.add('done');
    newCard.style.boxShadow = '0 0 24px rgba(74,156,90,0.4)';
    setTimeout(() => newCard.style.boxShadow = '', 600);
  }
  updateProgress(tab);
  checkAllDone(tab);
}

function updateProgress(tab) {
  if (tab !== currentTab) return;
  const list = adhkar[tab];
  const done = list.filter((d,i) => (state[getKey(tab,i)]||0) >= d.count).length;
  const pct = Math.round(done / list.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + list.length;
}

function checkAllDone(tab) {
  const all = adhkar[tab].every((d,i) => (state[getKey(tab,i)]||0) >= d.count);
  const el = document.getElementById('done_' + tab);
  if (all) { el.classList.add('show'); el.scrollIntoView({behavior:'smooth',block:'center'}); }
  else el.classList.remove('show');
}

function switchTab(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  document.getElementById(tab).classList.add('active');
  currentTab = tab;
  updateProgress(tab);
}

function resetAll() {
  state = {}; saveState(); buildCards();
  updateProgress(currentTab);
  ['morning','evening','sleep'].forEach(t => document.getElementById('done_'+t).classList.remove('show'));
  // Visual feedback
  const btn = document.querySelector('.reset-btn');
  btn.textContent = '✓ تمت الإعادة';
  btn.style.color = 'var(--green-light)';
  setTimeout(() => { btn.textContent = '↺ إعادة'; btn.style.color = ''; }, 1500);
}

function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('adhkar_theme', isLight ? 'light' : 'dark');
}

loadState(); 
// Load saved theme
if (localStorage.getItem('adhkar_theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('themeBtn').textContent = '🌙';
}
buildCards(); updateProgress('morning');
['morning','evening','sleep'].forEach(checkAllDone);
</script>
